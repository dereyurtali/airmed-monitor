<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:," />
<title>ali-yeni · staging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* AESTHETIC DIRECTION: "ops instrument panel" — gece kontrol odası / osiloskop.
     Palet design-for-ai palette.mjs (seed h38, muted, analogous) — warm grafit + tek kil aksan,
     near-monokrom; renk = anlam (eşik aşılınca). Tip: Space Grotesk (etiket) + IBM Plex Mono (veri). */
  :root{
    --n1:#1c1a18; --n2:#252220; --n3:#2f2b29; --n4:#383230; --n5:#403a37; --n6:#4a423f;
    --n7:#4f4744; --n8:#685e5a; --n9:#a0928d; --n10:#b2a4a0; --n11:#beb5b2; --n12:#ece6e5;
    --clay:#ca7f68; --clay-hi:#db937d; --clay-on:#150a07;     /* tek sinyal: aktif/koşan */
    --sage:#84cc86; --brick:#c56c65; --sand:#ceb47e;          /* ok · hata · uyarı (desatüre) */
    --bg:var(--n1); --ink:var(--n12); --dim:var(--n11); --faint:var(--n9); --ghost:var(--n8);
    --line:var(--n6); --line2:var(--n5); --hair:rgba(236,230,229,.06);
    --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
    --disp:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font:14px/1.5 var(--disp); color:var(--ink);
    background:var(--bg);
    /* hafif warm vignette — düz siyah değil, fosfor sıcaklığı */
    background-image:radial-gradient(140% 90% at 50% -20%, #2a2522 0%, var(--n1) 60%);
    background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
    letter-spacing:.1px;
  }
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  svg.ic{width:1em;height:1em;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.12em;flex:0 0 auto}

  /* ---- top bar: engraved instrument header ---- */
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--n1),rgba(19,18,18,.86));
    border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
  header{display:flex;align-items:center;gap:14px;max-width:1520px;margin:0 auto;padding:11px 18px}
  .mark{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:1.5px;color:var(--ink);display:flex;align-items:center;gap:9px}
  .led{width:7px;height:7px;border-radius:1px;background:var(--ghost);box-shadow:none;flex:0 0 auto}
  .led.on{background:var(--sage)} .led.bad{background:var(--brick)}
  .led.on{animation:beat 2.6s steps(1) infinite}
  @keyframes beat{0%,82%{opacity:1}83%,100%{opacity:.45}}
  .mark .slash{color:var(--n7)}
  .mark .env{color:var(--clay)}
  .host{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:2px;letter-spacing:.3px}
  .clock{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:8px}
  .gear{background:none;border:1px solid var(--line);color:var(--faint);width:32px;height:32px;border-radius:3px;font-size:14px;cursor:pointer;flex:0 0 auto}
  .gear:hover{color:var(--ink);border-color:var(--border)}
  .gear:focus-visible{outline:2px solid var(--clay);outline-offset:2px}

  /* ---- layout ---- */
  .grid{max-width:1520px;margin:0 auto;padding:16px 18px 44px;display:grid;gap:26px}
  .region{min-width:0}
  /* engraved section label: mono small-caps + extending rule + count */
  .lab{display:flex;align-items:center;gap:12px;margin:0 2px 11px;font-family:var(--mono);font-size:10.5px;
    letter-spacing:2.5px;text-transform:uppercase;color:var(--faint)}
  .lab .rule{flex:1;height:1px;background:var(--line)}
  .lab .ct{color:var(--ghost);letter-spacing:1px}
  .lab .ct.warn{color:var(--brick)} .lab .ct.ok{color:var(--n8)}

  /* ---- pipeline ledger (queues + jobs) ---- */
  .runs{display:flex;flex-direction:column}
  .run{padding:14px 2px 14px 16px;border-top:1px solid var(--hair);position:relative}
  .run:first-child,.grp+.run{border-top:0}
  .run::before{content:"";position:absolute;left:2px;top:18px;bottom:14px;width:2px;background:var(--n5)}
  .run.r::before{background:var(--clay)}
  .run-h{display:flex;align-items:baseline;gap:10px}
  .idx{font-family:var(--mono);font-size:11px;color:var(--ghost);flex:0 0 auto;width:18px}
  .run-name{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:-.2px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .dep{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--clay-on);background:var(--clay);
    padding:1px 6px;border-radius:2px;margin-left:6px;vertical-align:1px}
  .tag{font-family:var(--mono);font-size:12px;letter-spacing:.5px;flex:0 0 auto;color:var(--faint)}
  .tag b{font-weight:600;font-size:15px}
  .run.r .tag{color:var(--clay-hi)}
  .run-sub{font-family:var(--mono);font-size:11px;color:var(--faint);margin:3px 0 0 28px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .run-sub .br{color:var(--n10)}
  /* determinate meter — solid, tick-scaled, no gradient/sheen */
  .meter{height:3px;background:var(--n4);margin:11px 0 0 28px;position:relative;overflow:hidden;border-radius:1px}
  .meter > i{display:block;height:100%;background:var(--clay);transition:width .8s cubic-bezier(.2,.8,.3,1)}
  .run.q .meter > i{background:var(--n7)}
  .run.r .meter::after{content:"";position:absolute;top:0;bottom:0;width:14px;background:var(--clay-hi);
    opacity:.55;filter:blur(2px);left:0;animation:sweep 2.4s cubic-bezier(.5,0,.5,1) infinite}
  @keyframes sweep{0%{left:-14px}100%{left:100%}}
  /* jobs — connected sub-rows */
  .jobs{margin:8px 0 0 28px}
  .job{display:flex;align-items:center;gap:10px;padding:4px 0;font-family:var(--mono);font-size:12px}
  .job .con{width:8px;height:1px;background:var(--n6);flex:0 0 auto}
  .job .sq{width:7px;height:7px;border-radius:1px;background:var(--n7);flex:0 0 auto}
  .job.done .sq{background:var(--n8)} .job.act .sq{background:var(--clay);animation:beat 1.4s steps(1) infinite}
  .job.fail .sq{background:var(--brick)}
  .job .jn{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .job.act .jn{color:var(--ink)}
  .job .jp{color:var(--faint);width:34px;text-align:right;flex:0 0 auto;font-size:11px}
  .job.act .jp{color:var(--clay-hi)}
  .idle{padding:22px 4px 18px;color:var(--faint);font-family:var(--mono);font-size:12px;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .idle .led{width:7px;height:7px}

  /* ---- instrument cluster (vitals) — hairline-separated readouts ---- */
  .cluster{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--n2);box-shadow:inset 0 1px 0 rgba(236,230,229,.045)}
  .gel{padding:12px 13px 11px;border-left:1px solid var(--hair)}
  .gel:first-child{border-left:0}
  .gel .gl{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:5px}
  .gel .gv{font-family:var(--mono);font-weight:500;font-size:21px;margin-top:5px;line-height:1;color:var(--ink)}
  .gel .gv .u{font-size:11px;color:var(--faint)}
  .scope{width:100%;height:30px;display:block;margin-top:7px}
  .gel .rg{font-family:var(--mono);font-size:9px;color:var(--ghost);display:flex;justify-content:space-between;margin-top:2px}
  /* linear meters: disk + battery as panel gauges */
  .meters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .lm{border:1px solid var(--line);border-radius:4px;padding:11px 12px;background:var(--n2);box-shadow:inset 0 1px 0 rgba(236,230,229,.045)}
  .lm .lt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
  .lm .lt b{color:var(--ink);font-weight:500;letter-spacing:0}
  .lm .track{height:6px;background:var(--n4);border-radius:1px;margin-top:9px;overflow:hidden;display:flex}
  .lm .track > i{height:100%;background:var(--clay)}
  .lm .seg{height:100%;width:1px;background:var(--n1);opacity:.6}

  /* ---- status board (services) — systemctl-style mono rows ---- */
  .board{border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--n2);box-shadow:inset 0 1px 0 rgba(236,230,229,.045)}
  .srow{display:flex;align-items:center;gap:11px;padding:8px 13px;border-top:1px solid var(--hair);font-family:var(--mono);font-size:12.5px}
  .srow:first-child{border-top:0}
  .srow .sq{width:8px;height:8px;border-radius:1px;flex:0 0 auto;background:var(--n7)}
  .sq.ok{background:var(--sage)} .sq.bad{background:var(--brick)}
  .srow .sn{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .sm{color:var(--faint);font-size:11px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .ss{color:var(--ghost);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;flex:0 0 auto}
  .srow.bad .ss{color:var(--brick)} .srow.ok .ss{color:var(--n8)}
  .fault{font-family:var(--mono);font-size:11.5px;color:var(--brick);background:rgba(197,108,101,.1);
    border-bottom:1px solid rgba(197,108,101,.25);padding:8px 13px;display:flex;gap:8px;align-items:center}

  /* ---- log (merges / PRs) — terminal ledger ---- */
  .log{font-family:var(--mono)}
  .lrow{display:flex;gap:11px;padding:8px 2px;border-top:1px solid var(--hair);align-items:baseline}
  .lrow:first-child{border-top:0}
  .lrow .sha{font-size:11px;color:var(--clay);flex:0 0 auto}
  .lrow .num{font-size:11px;color:var(--clay);flex:0 0 auto;width:42px}
  .lrow .lt{font-size:12.5px;color:var(--dim);line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .lrow .lm2{font-size:10.5px;color:var(--ghost);margin-top:1px}
  a.lk{text-decoration:none;color:inherit;display:block}
  a.lk:hover .lt{color:var(--ink)}
  a.lk:focus-visible{outline:1px solid var(--clay);outline-offset:2px}
  .enter{animation:enter .4s ease-out}
  @keyframes enter{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
  .empty{color:var(--ghost);font-family:var(--mono);font-size:11.5px;padding:14px 2px;letter-spacing:.5px}

  .blk+.blk{margin-top:22px}
  /* group sub-headers inside the ledger (sub-composition hierarchy) */
  .grp{display:flex;align-items:center;gap:10px;margin:16px 2px 0;font-family:var(--mono);font-size:9.5px;
    letter-spacing:2.5px;text-transform:uppercase;color:var(--faint)}
  .runs > .grp:first-child{margin-top:2px}
  .grp .gn{color:var(--ghost)}
  .grp .gline{flex:1;height:1px;background:var(--hair)}

  /* ---- responsive: desktop = single-screen 3-bay instrument deck ---- */
  @media (min-width:1200px){
    .grid{grid-template-columns:1.55fr 1fr .96fr;grid-template-areas:"flow mid right";
      height:calc(100dvh - 50px);gap:30px;align-content:stretch}
    #reg-flow{grid-area:flow;overflow:auto;padding-right:8px}
    #reg-side{grid-area:mid;overflow:auto}
    #reg-bottom{grid-area:right;overflow:auto}
    .region::-webkit-scrollbar{width:8px}
    .region::-webkit-scrollbar-thumb{background:var(--n5)}
    .region::-webkit-scrollbar-track{background:transparent}
  }

  /* ---- config ---- */
  .modal{position:fixed;inset:0;background:rgba(10,9,8,.86);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;backdrop-filter:blur(4px)}
  .modal.show{display:flex}
  .sheet{background:var(--n2);border:1px solid var(--line);border-radius:6px;max-width:430px;width:100%;padding:22px}
  .sheet h3{margin:0 0 4px;font-size:16px;font-family:var(--disp);font-weight:600}
  .sheet p{color:var(--dim);font-size:12.5px;margin:0 0 14px;line-height:1.5}
  label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin:13px 0 5px}
  input{width:100%;background:var(--n1);border:1px solid var(--line);border-radius:3px;color:var(--ink);padding:11px;font-size:13px;font-family:var(--mono)}
  input:focus{outline:none;border-color:var(--clay)}
  .btn{margin-top:18px;width:100%;border:0;border-radius:3px;padding:12px;font-size:13px;font-weight:600;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--clay-on);background:var(--clay)}
  .btn:active{background:var(--clay-hi)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--faint)}
  .btn:focus-visible{outline:2px solid var(--clay);outline-offset:2px}
  .err{color:var(--brick);font-family:var(--mono);font-size:11px;margin-top:10px;min-height:14px}
  .hint{font-family:var(--mono);font-size:10px;color:var(--ghost);margin-top:9px;line-height:1.6}
  code{color:var(--clay);font-size:10.5px}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    .meter::after{display:none}
    .meter > i,.lm .track > i{transition:none}
  }
</style>
</head>
<body>
<div class="top"><header>
  <div class="mark"><span class="led on" id="led"></span>ALI-YENI<span class="slash">/</span><span class="env">STAGING</span></div>
  <span class="host mono" id="hostline">bağlanıyor…</span>
  <div class="clock"><span id="freshtxt">—</span></div>
  <button class="gear" id="gear" title="Ayarlar" aria-label="Ayarlar">⚙</button>
</header></div>

<div class="grid">
  <section class="region" id="reg-flow"></section>
  <section class="region" id="reg-side"></section>
  <section class="region" id="reg-bottom"></section>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3>Bağlantı</h3>
    <p>Veriler private repo'dan salt-okunur token ile çekilir. Token yalnız bu cihazın tarayıcısında saklanır, hiçbir sunucuya gönderilmez.</p>
    <label>GitHub fine-grained token (read-only)</label>
    <input id="f-token" type="password" placeholder="github_pat_…" autocomplete="off" />
    <label>Status repo</label>
    <input id="f-statusrepo" placeholder="DNA-Software-Solutions/airmed-status" autocomplete="off" />
    <label>Actions repo</label>
    <input id="f-actionsrepo" placeholder="DNA-Software-Solutions/airmed-hbys" autocomplete="off" />
    <div class="err" id="cfgerr"></div>
    <button class="btn" id="save">Kaydet &amp; bağlan</button>
    <button class="btn ghost" id="forget">Token'ı sil</button>
    <div class="hint">İzinler (salt-okuma): <code>Contents</code> + <code>Actions</code> + <code>Pull requests</code> = Read. Başka yetki verme.</div>
  </div>
</div>

<script>
const LS="airmed-monitor.cfg";
const $=s=>document.querySelector(s);
const cfg=()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch{return{}}};
const setCfg=c=>localStorage.setItem(LS,JSON.stringify(c));
let timer=null,lastTs=null,seenMerge=new Set(),seenPr=new Set(),first=true;

const IC={
  merge:'<svg class="ic" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="8" r="2.4"/><path d="M6 8.4v7.2"/><path d="M18 10.4c0 4-3 5-5.5 5.6"/></svg>',
  pr:'<svg class="ic" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M6 8.4v7.2"/><path d="M18 9v6.6"/><path d="M13 6h3a2 2 0 0 1 2 2"/></svg>',
  cpu:'<svg class="ic" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></svg>',
  therm:'<svg class="ic" viewBox="0 0 24 24"><path d="M12 4a2 2 0 0 1 2 2v8a4 4 0 1 1-4 0V6a2 2 0 0 1 2-2z"/></svg>',
  ram:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="10" rx="1"/><path d="M7 17v3M12 17v3M17 17v3"/></svg>',
  alert:'<svg class="ic" viewBox="0 0 24 24"><path d="M12 3 2 20h20z"/><path d="M12 9v5"/><path d="M12 17h.01"/></svg>',
};

function openModal(){const c=cfg();$("#f-token").value=c.token||"";$("#f-statusrepo").value=c.statusRepo||"DNA-Software-Solutions/airmed-status";$("#f-actionsrepo").value=c.actionsRepo||"DNA-Software-Solutions/airmed-hbys";$("#cfgerr").textContent="";$("#modal").classList.add("show");}
function closeModal(){$("#modal").classList.remove("show");}
$("#gear").onclick=openModal;
$("#forget").onclick=()=>{localStorage.removeItem(LS);location.reload();};
$("#save").onclick=async()=>{
  const c={token:$("#f-token").value.trim(),statusRepo:$("#f-statusrepo").value.trim(),actionsRepo:$("#f-actionsrepo").value.trim()};
  if(!c.token||!c.statusRepo){$("#cfgerr").textContent="Token ve status repo zorunlu.";return;}
  $("#cfgerr").textContent="kontrol ediliyor…";
  try{await fetchStatus(c);}catch(e){$("#cfgerr").textContent="Bağlanamadı: "+e.message;return;}
  setCfg(c);closeModal();first=true;seenMerge.clear();seenPr.clear();start();
};

async function gh(url,c,raw){
  const h={Authorization:"Bearer "+c.token,"X-GitHub-Api-Version":"2022-11-28"};
  h.Accept=raw?"application/vnd.github.raw":"application/vnd.github+json";
  const r=await fetch(url,{headers:h,cache:"no-store"});
  if(r.status===401||r.status===403)throw new Error("token reddedildi ("+r.status+")");
  if(r.status===404)throw new Error("repo/dosya yok (404)");
  if(!r.ok)throw new Error("HTTP "+r.status);
  return raw?r.text():r.json();
}
const fetchStatus =c=>gh(`https://api.github.com/repos/${c.statusRepo}/contents/status.json`,c,true).then(JSON.parse);
const fetchHistory=c=>gh(`https://api.github.com/repos/${c.statusRepo}/contents/history.json`,c,true).then(JSON.parse).catch(()=>[]);
const fetchRuns   =c=>gh(`https://api.github.com/repos/${c.actionsRepo}/actions/runs?per_page=30`,c,false).catch(()=>null);
const fetchCommits=c=>gh(`https://api.github.com/repos/${c.actionsRepo}/commits?sha=main&per_page=8`,c,false).catch(()=>null);
const fetchPRs    =c=>gh(`https://api.github.com/repos/${c.actionsRepo}/pulls?state=open&sort=updated&direction=desc&per_page=8`,c,false).catch(()=>null);
const fetchJobs   =(c,id)=>gh(`https://api.github.com/repos/${c.actionsRepo}/actions/runs/${id}/jobs`,c,false).then(j=>j.jobs||[]).catch(()=>[]);

const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const clamp=n=>Math.max(0,Math.min(100,Number(n)||0));
function ago(iso){if(!iso)return"—";let s=Math.round((Date.now()-new Date(iso))/1000);if(s<0)s=0;
  if(s<60)return s+"sn";if(s<3600)return Math.round(s/60)+"dk";if(s<86400)return Math.round(s/3600)+"sa";return Math.round(s/86400)+"g";}
function hms(iso){let s=Math.round((Date.now()-new Date(iso))/1000);if(s<0)s=0;
  const m=Math.floor(s/60),ss=s%60,h=Math.floor(m/60);
  return h?`${h}:${String(m%60).padStart(2,"0")}:${String(ss).padStart(2,"0")}`:`${m}:${String(ss).padStart(2,"0")}`;}
function dur(sec){sec=Number(sec)||0;const d=Math.floor(sec/86400),h=Math.floor(sec%86400/3600),m=Math.floor(sec%3600/60);return d?`${d}g ${h}sa`:h?`${h}sa ${m}dk`:`${m}dk`;}
const isDeploy=r=>/deploy/i.test((r.name||"")+" "+(r.path||""));
// renk = anlam: yalnız eşik aşılınca tonlanır (aksi halde nötr)
function lvl(p,warn,crit){p=Number(p);return p>=crit?"var(--brick)":p>=warn?"var(--sand)":"var(--n9)";}
const cpuC=p=>lvl(p,70,90), memC=p=>lvl(p,80,92), tmpC=t=>t==null?"var(--n9)":lvl(t,65,80);

function jobPct(j){const s=j.steps||[];if(!s.length)return j.status==="completed"?100:0;
  const done=s.filter(x=>x.status==="completed").length;const half=s.some(x=>x.status==="in_progress")?.5:0;
  return Math.min(100,Math.round((done+half)/s.length*100));}
function runPct(r){const js=r.jobs||[];if(!js.length)return r.status==="completed"?100:0;
  let d=0,t=0;js.forEach(j=>{const s=j.steps||[];const n=s.length||1;t+=n;
    if(s.length){d+=s.filter(x=>x.status==="completed").length+(s.some(x=>x.status==="in_progress")?.5:0);}
    else if(j.status==="completed")d+=1;});
  return t?Math.min(100,Math.round(d/t*100)):0;}

// osiloskop izi: monokrom, faint baseline grid, ince trace
function scope(vals,color){
  const v=vals.filter(x=>x!=null&&!isNaN(x));const w=140,h=30,n=v.length;
  const grid=`<line x1="0" y1="${(h/2).toFixed(1)}" x2="${w}" y2="${(h/2).toFixed(1)}" stroke="var(--hair)" stroke-width="1" stroke-dasharray="2 3"/>`;
  if(n<2)return {svg:`<svg class="scope" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}</svg>`,rg:""};
  let mn=Math.min(...v),mx=Math.max(...v);const span=mx-mn;const pad=span>0?span*0.2:Math.max(1,mx*0.06);
  const lo=Math.max(0,mn-pad),hi=mx+pad,rng=hi-lo||1;
  const pts=v.map((x,i)=>[+(i/(n-1)*w).toFixed(1),+(h-1-((x-lo)/rng)*(h-2)).toFixed(1)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0]+" "+p[1]).join(" ");const last=pts[n-1];
  return {svg:`<svg class="scope" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
    <rect x="${(last[0]-1.4).toFixed(1)}" y="${(last[1]-1.4).toFixed(1)}" width="2.8" height="2.8" fill="${color}"/></svg>`,
    rg:`<div class="rg"><span>${Math.round(mn*10)/10}</span><span>${Math.round(mx*10)/10}</span></div>`};
}
function lmeter(pct,nm,val){pct=clamp(pct);const c=pct>=90?'var(--brick)':pct>=72?'var(--sand)':'var(--clay)';
  return `<div class="lm"><div class="lt"><span>${nm}</span><b>${val}</b></div>
    <div class="track"><i style="width:${pct}%;background:${c}"></i></div></div>`;}

function jobRow(j){
  const st=j.status==="completed"?(j.conclusion&&j.conclusion!=="success"?"fail":"done"):(j.status==="in_progress"?"act":"");
  const p=jobPct(j);
  const tail=st==="act"?`<span class="jp">${p}%</span>`:`<span class="jp">${st==="done"?"ok":st==="fail"?"err":"·"}</span>`;
  return `<div class="job ${st}"><span class="con"></span><span class="sq"></span><span class="jn">${esc(j.name)}</span>${tail}</div>`;}

function runCard(r,kind,i){
  const pct=runPct(r);const dep=isDeploy(r)?`<span class="dep">DEPLOY</span>`:"";
  const sub=`<span class="br">${esc(r.head_branch||"")}</span> · ${esc((r.actor&&r.actor.login)||"")} · ${esc(r.event||"")}`;
  const tag=kind==="r"
    ? `<span class="tag mono"><b>${pct}</b>% · <span data-start="${esc(r.run_started_at||r.created_at)}">${hms(r.run_started_at||r.created_at)}</span></span>`
    : `<span class="tag mono">QUEUED · <span data-wait="1" data-start="${esc(r.created_at)}">${hms(r.created_at)}</span></span>`;
  const jobs=(r.jobs&&r.jobs.length)?`<div class="jobs">${r.jobs.map(jobRow).join("")}</div>`:"";
  return `<div class="run ${kind}">
    <div class="run-h"><span class="idx mono">${String(i+1).padStart(2,"0")}</span>
      <span class="run-name">${esc(r.name||r.display_title)}${dep}</span>${tag}</div>
    <div class="run-sub">${sub}</div>
    <div class="meter"><i style="width:${kind==="r"?pct:4}%"></i></div>
    ${jobs}</div>`;}

function render(s,hist,runs,commits,prs){
  const sy=s.system||{};
  $("#hostline").textContent=`${s.host||"ali-yeni"} · ${sy.cpuCount||"?"}c · ${dur(s.uptimeSec)}`;
  lastTs=s.ts;

  // ---- flow: pipeline ledger ----
  const wr=(runs&&runs.workflow_runs)||[];
  const queued=wr.filter(r=>["queued","waiting","pending","requested"].includes(r.status));
  const running=wr.filter(r=>r.status==="in_progress");
  const grp=(t,n)=>`<div class="grp"><span class="gn">${t}</span><span>${n}</span><span class="gline"></span></div>`;
  let flow,idx=0,body="";
  if(running.length){body+=grp("ÇALIŞAN",running.length)+running.map(r=>runCard(r,"r",idx++)).join("");}
  if(queued.length){body+=grp("KUYRUK",queued.length)+queued.map(r=>runCard(r,"q",idx++)).join("");}
  if(body)flow=`<div class="runs">${body}</div>`;
  else flow=`<div class="idle"><span class="led on"></span>kuyruk boş · çalışan iş yok</div>`;
  $("#reg-flow").innerHTML=`<div class="lab">İŞ AKIŞI<span class="rule"></span>
    <span class="ct">${running.length} RUN</span><span class="ct">${queued.length} Q</span></div>${flow}`;

  // ---- side: instrument cluster + meters + status board ----
  const H=hist||[];
  const cs=scope(H.map(x=>x.cpu),cpuC(sy.cpuPct)),ts=scope(H.map(x=>x.temp),tmpC(sy.tempMaxC)),ms=scope(H.map(x=>x.mem),memC(sy.memPct));
  const bat=sy.batteryPct,disk=sy.diskPct;
  let side=`<div class="blk"><div class="lab">VİTALLER<span class="rule"></span></div>
    <div class="cluster">
      <div class="gel"><div class="gl">${IC.cpu} CPU</div><div class="gv" style="color:${cpuC(sy.cpuPct)}">${sy.cpuPct??0}<span class="u">%</span></div>${cs.svg}${cs.rg}</div>
      <div class="gel"><div class="gl">${IC.therm} ISI</div><div class="gv" style="color:${tmpC(sy.tempMaxC)}">${sy.tempMaxC==null?"—":sy.tempMaxC}<span class="u">°C</span></div>${ts.svg}${ts.rg}</div>
      <div class="gel"><div class="gl">${IC.ram} RAM</div><div class="gv" style="color:${memC(sy.memPct)}">${sy.memPct??0}<span class="u">%</span></div>${ms.svg}${ms.rg}</div>
    </div>
    <div class="meters">
      ${lmeter(disk,"DISK",(sy.diskUsedGb||0)+"/"+(sy.diskTotalGb||0)+"G")}
      ${lmeter(bat==null?0:bat,"PWR",(bat==null?"—":bat+"%")+(sy.acOnline?" AC":""))}
    </div></div>`;

  const failed=s.failedUnits||[];
  let svc=`<div class="blk"><div class="lab">SERVİSLER<span class="rule"></span><span class="ct ${failed.length?'warn':'ok'}">${failed.length?failed.length+" FAULT":"NOMINAL"}</span></div><div class="board">`;
  if(failed.length)svc+=`<div class="fault">${IC.alert} ${failed.map(esc).join("  ")}</div>`;
  const row=(nm,active,meta)=>{const ok=active==="active",bad=active==="failed";
    return `<div class="srow ${bad?'bad':ok?'ok':''}"><span class="sq ${bad?'bad':ok?'ok':''}"></span>
      <span class="sn">${esc(nm)}</span><span class="sm">${esc(meta||"")}</span><span class="ss">${ok?'up':bad?'fault':esc(active)}</span></div>`;};
  (s.hostServices||[]).forEach(h=>svc+=row(h.name,h.active,h.sub));
  (s.runners||[]).forEach(r=>svc+=row(r.name,r.active,"runner"));
  (s.containers||[]).forEach(c=>svc+=row(c.name.replace(/^airmed-staging-/,"stg/"),c.state!=="running"?"failed":"active",c.healthy?"healthy":c.status));
  if(s.staging&&s.staging.health)svc+=row("api/health",s.staging.health.status==="ok"?"active":"failed","v"+s.staging.health.version);
  svc+=`</div></div>`;
  $("#reg-side").innerHTML=side+svc;

  // ---- bottom: merge log + PR queue ----
  let mg=`<div class="blk"><div class="lab">${IC.merge} MERGE LOG<span class="rule"></span></div><div class="log">`;
  if(commits&&commits.length){
    mg+=commits.map(c=>{const msg=(c.commit.message||"").split("\n")[0];const isNew=!first&&!seenMerge.has(c.sha);seenMerge.add(c.sha);
      return `<a class="lk" href="${esc(c.html_url)}" target="_blank" rel="noopener"><div class="lrow${isNew?" enter":""}">
        <span class="sha">${esc((c.sha||"").slice(0,7))}</span><div><div class="lt">${esc(msg)}</div>
        <div class="lm2">${esc((c.author&&c.author.login)||(c.commit.author&&c.commit.author.name)||"")} · ${ago(c.commit.author&&c.commit.author.date)}</div></div></div></a>`;}).join("");
  }else mg+=`<div class="empty">veri yok</div>`;
  mg+=`</div></div>`;

  let pr=`<div class="blk"><div class="lab">${IC.pr} AÇIK PR<span class="rule"></span><span class="ct">${prs?prs.length:0}</span></div><div class="log">`;
  if(prs&&prs.length){
    pr+=prs.map(p=>{const isNew=!first&&!seenPr.has(p.number);seenPr.add(p.number);
      return `<a class="lk" href="${esc(p.html_url)}" target="_blank" rel="noopener"><div class="lrow${isNew?" enter":""}">
        <span class="num">#${p.number}</span><div><div class="lt">${esc(p.title)}</div>
        <div class="lm2">${esc((p.user&&p.user.login)||"")} · ${esc(p.head&&p.head.ref)} · ${ago(p.updated_at)}</div></div></div></a>`;}).join("");
  }else pr+=`<div class="empty">açık PR yok</div>`;
  pr+=`</div></div>`;
  $("#reg-bottom").innerHTML=pr+mg;

  first=false;paintFresh();
}

function tickElapsed(){document.querySelectorAll("[data-start]").forEach(el=>{el.textContent=hms(el.dataset.start);});}
function paintFresh(){
  if(!lastTs){$("#freshtxt").textContent="—";return;}
  const stale=Math.round((Date.now()-new Date(lastTs))/1000)>90;
  $("#led").className="led "+(stale?"bad":"on");
  $("#freshtxt").textContent=(stale?"STALE ":"sync ")+ago(lastTs);
  $("#freshtxt").style.color=stale?"var(--brick)":"var(--faint)";
}

async function tick(){
  const c=cfg();
  try{
    const [s,hist,runs,commits,prs]=await Promise.all([fetchStatus(c),fetchHistory(c),fetchRuns(c),fetchCommits(c),fetchPRs(c)]);
    const wr=(runs&&runs.workflow_runs)||[];
    const active=wr.filter(r=>["in_progress","queued","waiting","pending","requested"].includes(r.status)).slice(0,6);
    await Promise.all(active.map(r=>fetchJobs(c,r.id).then(j=>r.jobs=j)));
    render(s,hist,runs,commits,prs);
  }catch(e){
    $("#hostline").textContent="hata: "+e.message;$("#led").className="led bad";
    if(/token reddedildi/.test(e.message))openModal();
  }
}
function start(){if(timer)clearInterval(timer);tick();timer=setInterval(tick,15000);}
setInterval(tickElapsed,1000);setInterval(paintFresh,5000);
(function(){const c=cfg();if(!c.token||!c.statusRepo)openModal();else start();})();
document.addEventListener("visibilitychange",()=>{if(!document.hidden)tick();});
</script>
